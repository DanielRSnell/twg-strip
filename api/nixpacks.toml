[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo_pgsql", "php84Extensions.pgsql", "php84Extensions.zip", "php84Extensions.pcntl", "php84Packages.composer", "nodejs_22"]

[phases.install]
cmds = [
    "echo '{\"http-basic\":{\"satis.spatie.be\":{\"username\":\"'$SATIS_USERNAME'\",\"password\":\"'$SATIS_PASSWORD'\"}}}' > auth.json",
    "composer install --no-dev --optimize-autoloader --no-scripts",
    "npm install -g mjml"
]

[phases.build]
cmds = [
    "CACHE_STORE=null php artisan package:discover --ansi",
    "CACHE_STORE=null php artisan filament:assets",
    "CACHE_STORE=null php artisan mailcoach:publish",
    "CACHE_STORE=null php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && (php artisan queue:work --queue=send-campaign,mailcoach,mailcoach-schedule,mailcoach-feedback,send-mail,send-automation-mail,default --sleep=3 --tries=3 --timeout=300 &) && (php artisan schedule:work &) && php artisan serve --host=0.0.0.0 --port=8080"
