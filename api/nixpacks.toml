[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo_pgsql", "php84Extensions.pgsql", "php84Extensions.zip", "php84Extensions.pcntl", "php84Packages.composer", "nodejs_22"]

[phases.install]
cmds = [
    "echo '{\"http-basic\":{\"satis.spatie.be\":{\"username\":\"'$SATIS_USERNAME'\",\"password\":\"'$SATIS_PASSWORD'\"}}}' > auth.json",
    "composer install --no-dev --optimize-autoloader --no-scripts",
    "composer dump-autoload --optimize",
    "php artisan package:discover --ansi",
    "npm install -g mjml"
]

[phases.build]
cmds = [
    "CACHE_STORE=array php artisan filament:assets",
    "CACHE_STORE=array php artisan mailcoach:publish",
    "CACHE_STORE=array php artisan config:cache",
    "CACHE_STORE=array php artisan route:cache",
    "CACHE_STORE=array php artisan view:cache"
]

[start]
cmd = "php artisan config:clear && php artisan config:cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8080"
