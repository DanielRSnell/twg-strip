services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/var/www/html

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan queue:work --queue=emails,tracking --tries=3 --timeout=60
    env_file: .env
    volumes:
      - .:/var/www/html
